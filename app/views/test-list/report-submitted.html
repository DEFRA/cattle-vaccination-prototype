{% extends "layouts/main.html" %}

{% block pageTitle %}
  Results submitted – GOV.UK
{% endblock %}

{% block content %}
<div class="govuk-grid-row">
  <div class="govuk-grid-column-two-thirds">

    <div class="govuk-panel govuk-panel--confirmation">
      <h1 class="govuk-panel__title">Results submitted</h1>
      {% if caseNumber %}
        <div class="govuk-panel__body">
          Case number<br><strong>{{ caseNumber }}</strong>
        </div>
      {% endif %}
    </div>

    <p class="govuk-body govuk-!-margin-top-6">The skin test results have been submitted to Salesforce.</p>

    <p class="govuk-body">
      <a class="govuk-link" href="/test-list/search">Start a new task</a>
    </p>

  </div>
</div>
{% endblock %}
